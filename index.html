<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>game</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        /* 게임판 */
        #game-board {
            width: 600px;
            height: 400px;
            background-color: #34495e;
            position: relative;
            border: 5px solid #f1c40f;
            border-radius: 10px;
        }

        /* 플레이어 (제공해주신 스타일 수정) */
        #player {
            width: 40px;
            height: 40px;
            background: #e74c3c; /* 빨간색 */
            position: absolute;
            top: 100px; /* 오타 수정: 100xp -> 100px */
            left: 100px;
            border-radius: 5px;
            transition: all 0.1s;
        }

        /* 코인 (제공해주신 이미지 경로 사용) */
        #coin {
            width: 60px;
            height: 60px;
            position: absolute;
            background-image: url('/images/coin2.png'); /* 경로 설정 */
            background-size: cover;
            background-position: center;
        }

        /* 점수판 */
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-board">
        <div id="score">Score: 0</div>
        <div id="player"></div>
        <div id="coin"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const coin = document.getElementById('coin');
        const scoreDisplay = document.getElementById('score');
        const board = document.getElementById('game-board');

        let score = 0;

        // 보드 크기
        const boardWidth = 600;
        const boardHeight = 400;

        // 코인 위치 초기화 (랜덤)
        function moveCoin() {
            const x = Math.floor(Math.random() * (boardWidth - 40));
            const y = Math.floor(Math.random() * (boardHeight - 40));
            coin.style.left = x + 'px';
            coin.style.top = y + 'px';
        }

        // 충돌 감지 (플레이어가 코인을 먹었는지 확인)
        function checkCollision() {
            const pRect = player.getBoundingClientRect();
            const cRect = coin.getBoundingClientRect();

            if (!(pRect.right < cRect.left || 
                pRect.left > cRect.right || 
                pRect.bottom < cRect.top || 
                pRect.top > cRect.bottom)) {
                
                score++;
                scoreDisplay.innerText = "Score: " + score;
                moveCoin(); // 코인 위치 이동
            }
        }

        // 키보드 조작
        document.onkeydown = (e) => {
            let top = parseInt(player.style.top) || 100;
            let left = parseInt(player.style.left) || 100;
            const step = 20; // 이동 거리

            switch(e.key) {
                case 'ArrowUp': if(top > 0) top -= step; break;			 
                case 'ArrowDown': if(top < boardHeight - 50) top += step; break;	
                case 'ArrowLeft': if(left > 0) left -= step; break;			 
                case 'ArrowRight': if(left < boardWidth - 50) left += step; break;			 
            }

            player.style.top = top + 'px';
            player.style.left = left + 'px';

            checkCollision(); // 이동할 때마다 충돌 확인
        };

        // 초기 시작
        moveCoin();
    </script>
</body>

</html>
